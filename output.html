<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Output Methods</title>
</head>
<body>

<h2>Different Ways of Displaying Output</h2>

<div id="outputContainer"></div>

<script>
    // 1. innerHTML: Writing into an HTML element
    document.getElementById("outputContainer").innerHTML =
        "<p>Writing to the page using innerHTML</p>";

    // 2. document.write(): Directly writing into the HTML page
    document.write("<p>Writing using document.write()</p>");

    // 3. alert(): Displaying output in a popup box
    alert("This is an alert box!");

    // 4. console.log(): Displaying output in the browser console
    console.log("This message appears in the console.");
</script>

</body>
</html>
