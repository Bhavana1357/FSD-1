<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Functions & Events</title>
</head>
<body>

<h2>JavaScript Functions & Events</h2>

Enter a number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<h3>Result:</h3>
<p id="result"></p>

<script>

// Factorial
function factorial() {
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact *= i;
    }

    document.getElementById("result").innerHTML =
        "Factorial: " + fact;
}

// Fibonacci
function fibonacci() {
    let n = parseInt(document.getElementById("num").value);
    let a = 0, b = 1, series = "";

    for (let i = 0; i < n; i++) {
        series += a + " ";
        let temp = a + b;
        a = b;
        b = temp;
    }

    document.getElementById("result").innerHTML =
        "Fibonacci Series: " + series;
}

// Prime numbers
function prime() {
    let n = parseInt(document.getElementById("num").value);
    let result = "";

    for (let i = 2; i <= n; i++) {
        let isPrime = true;

        for (let j = 2; j <= i / 2; j++) {
            if (i % j === 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            result += i + " ";
        }
    }

    document.getElementById("result").innerHTML =
        "Prime Numbers: " + result;
}

// Palindrome
function palindrome() {
    let n = parseInt(document.getElementById("num").value);
    let original = n;
    let rev = 0;

    while (n > 0) {
        let digit = n % 10;
        rev = rev * 10 + digit;
        n = Math.floor(n / 10);
    }

    if (original === rev) {
        document.getElementById("result").innerHTML =
            original + " is a Palindrome";
    } else {
        document.getElementById("result").innerHTML =
            original + " is NOT a Palindrome";
    }
}

</script>

</body>
</html>
