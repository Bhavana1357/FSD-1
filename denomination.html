<!DOCTYPE html>
<html>
<head>
    <title>Bank Denomination</title>
</head>
<body>

<h2>Bank Denomination Calculator</h2>

<label>Enter deposited amount:</label>
<input type="number" id="amount">
<button onclick="calculate()">Calculate</button>

<h3>Denominations:</h3>
<p id="result"></p>

<script>
function calculate() {
    let amount = parseInt(document.getElementById("amount").value);
    let output = "";

    let d100 = Math.floor(amount / 100);
    amount %= 100;

    let d50 = Math.floor(amount / 50);
    amount %= 50;

    let d20 = Math.floor(amount / 20);
    amount %= 20;

    let d10 = Math.floor(amount / 10);
    amount %= 10;

    let d5 = Math.floor(amount / 5);
    amount %= 5;

    let d2 = Math.floor(amount / 2);
    amount %= 2;

    let d1 = amount;

    if (d100) output += d100 + " - 100's<br>";
    if (d50) output += d50 + " - 50's<br>";
    if (d20) output += d20 + " - 20's<br>";
    if (d10) output += d10 + " - 10's<br>";
    if (d5) output += d5 + " - 5's<br>";
    if (d2) output += d2 + " - 2's<br>";
    if (d1) output += d1 + " - 1's<br>";

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
