<!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript</title>

    <!-- External JavaScript -->
    <script src="script.js"></script>

    <!-- Internal JavaScript -->
    <script>
        function showInternal() {
            document.getElementById("internal").innerHTML =
            "This message is from Internal JavaScript.";
        }
    </script>
</head>

<body>

<h2>JavaScript Demo</h2>

<button onclick="showInternal()">Internal JavaScript</button>
<p id="internal"></p>

<button onclick="showExternal()">External JavaScript</button>
<p id="external"></p>

</body>
</html>
