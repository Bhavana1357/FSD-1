<!DOCTYPE html>
<html>
<head>
    <title>Armstrong Number</title>
</head>
<body>

<h2>Check Armstrong Number</h2>
<button onclick="checkArmstrong()">Enter Number</button>

<script>
    function checkArmstrong() {
        let num = parseInt(prompt("Enter a number:"));
        let original = num;
        let sum = 0;

        while (num > 0) {
            let digit = num % 10;   // get last digit
            sum += digit * digit * digit; // cube of digit
            num = Math.floor(num / 10); // remove last digit
        }

        if (sum === original) {
            alert(original + " is an ARMSTRONG NUMBER");
        } else {
            alert(original + " is NOT an ARMSTRONG NUMBER");
        }
    }
</script>

</body>
</html>
